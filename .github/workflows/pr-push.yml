on: 
  push: 
    branch: 
      - main
      - "release/**"
    paths: 
      - "src/**"
  pull_request: 
    branch:
      - main
      - "release/**"

jobs: 
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        
      - name: run tests
        run: npm test